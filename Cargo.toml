[workspace]
members = [
    "crates/agora-protocol",
    "crates/agora-sdk",
    "crates/liminal",
    "crates/liminal-server",
]
resolver = "2"

[workspace.dependencies]
agora-core = { package = "liminal", path = "crates/liminal" }
agora-protocol = { path = "crates/agora-protocol", default-features = false }

[workspace.package]
edition = "2024"
rust-version = "1.85"
license = "MIT"
repository = "https://github.com/tomWhiting/liminal"
authors = [
    "Tom Whiting <tom@ablative.com.au>",
]

[workspace.lints.rust]
unsafe_code = "deny"

[workspace.lints.clippy]
all = { level = "deny", priority = -1 }
pedantic = { level = "deny", priority = -1 }
nursery = { level = "warn", priority = -1 }
unwrap_used = "deny"
expect_used = "deny"
panic = "deny"
